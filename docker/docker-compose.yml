version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ailearning-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ailearning_bbs
      MYSQL_USER: ${DB_USER:-ailearning}
      MYSQL_PASSWORD: ${DB_PASSWORD:-ailearning123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: ailearning-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ailearning_bbs?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-ailearning}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-ailearning123}
      JWT_SECRET: ${JWT_SECRET:-ailearning-bbs-secret-key-change-in-production-please-use-strong-random-key}
      JWT_EXPIRATION: 86400000
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend/Dockerfile
    container_name: ailearning-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data: